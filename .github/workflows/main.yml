      #     $patched += "#else`n"
      #     $patched += "    int err = posix_memalign(&ptr, ThreadedBufAlignment, size);`n"
      #     $patched += "#endif"
          
      #     # 使用正则表达式替换单行，忽略空格差异，大幅提升鲁棒性
